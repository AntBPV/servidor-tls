<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Servidor TLS</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0f172a; color: white; }
    .card { text-align: center; background: #1e293b; padding: 40px 60px; border-radius: 16px; border: 1px solid #334155; }
    h1 { color: #38bdf8; margin-bottom: 8px; }
    .version { background: #0ea5e9; color: white; padding: 4px 16px; border-radius: 999px; font-size: 14px; display: inline-block; margin: 12px 0; }
    .status { color: #4ade80; font-size: 18px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Servidor TLS</h1>
    <div class="version">v1.0.0</div>
    <p>Deploy automático con GitHub Webhook</p>
    <div class="status">✅ Online</div>
  </div>
</body>
</html>
